name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: node scripts/check-secrets.mjs

      - name: Lint PHP
        run: php scripts/php-lint.php
        continue-on-error: true

      - name: Lint JS
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
